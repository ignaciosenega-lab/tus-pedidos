version: "3.8"

services:
  app:
    build:
      context: .
      args:
        VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY}
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-tuspedidos_change_this_secret}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - app_data:/app/data
    restart: unless-stopped

volumes:
  app_data:
